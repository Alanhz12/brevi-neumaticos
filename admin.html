<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Brevi Neumáticos</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1e1e1e;
      --border: rgba(255,255,255,0.07);
      --amarillo: #f5a623;
      --amarillo-dark: #d4881e;
      --rojo: #c0392b;
      --verde: #27ae60;
      --texto: #e0e0e0;
      --gris: #888;
      --radius: 6px;
    }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--bg);
      color: var(--texto);
      min-height: 100vh;
    }

    /* ── LOGIN ── */
    #loginScreen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 60% 40%, rgba(245,166,35,0.08) 0%, transparent 60%), var(--bg);
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 3px solid var(--amarillo);
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      border-radius: var(--radius);
    }

    .login-logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 28px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #fff;
      margin-bottom: 8px;
    }
    .login-logo span { color: var(--amarillo); }

    .login-subtitle {
      color: var(--gris);
      font-size: 13px;
      margin-bottom: 36px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .field { margin-bottom: 20px; }
    .field label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: var(--gris); margin-bottom: 8px; }
    .field input {
      width: 100%;
      padding: 12px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: #fff;
      font-family: 'Barlow', sans-serif;
      font-size: 15px;
      transition: border-color 0.2s;
    }
    .field input:focus { outline: none; border-color: var(--amarillo); }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--amarillo);
      color: #000;
      border: none;
      border-radius: var(--radius);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-login:hover { background: var(--amarillo-dark); }
    .btn-login:active { transform: scale(0.99); }

    .login-error {
      color: var(--rojo);
      font-size: 13px;
      margin-top: 12px;
      text-align: center;
      min-height: 20px;
    }

    /* ── PANEL ── */
    #adminPanel { display: none; }

    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar-brand {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px;
      font-weight: 900;
      text-transform: uppercase;
      color: #fff;
    }
    .topbar-brand span { color: var(--amarillo); }

    .topbar-right { display: flex; align-items: center; gap: 16px; }

    .badge-admin {
      background: rgba(245,166,35,0.15);
      border: 1px solid rgba(245,166,35,0.3);
      color: var(--amarillo);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--gris);
      padding: 8px 16px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 13px;
      font-family: 'Barlow', sans-serif;
      display: flex; align-items: center; gap: 6px;
      transition: all 0.2s;
    }
    .btn-logout:hover { border-color: var(--rojo); color: var(--rojo); }

    .main-content { padding: 40px 32px; max-width: 1100px; margin: 0 auto; }

    .page-header { margin-bottom: 32px; }
    .page-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 36px;
      font-weight: 900;
      text-transform: uppercase;
      color: #fff;
      margin-bottom: 4px;
    }
    .page-title span { color: var(--amarillo); }
    .page-subtitle { color: var(--gris); font-size: 14px; }

    /* ── FORM ── */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 3px solid var(--amarillo);
      border-radius: var(--radius);
      padding: 32px;
      margin-bottom: 40px;
    }

    .form-card-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #fff;
      margin-bottom: 24px;
      display: flex; align-items: center; gap: 10px;
    }
    .form-card-title i { color: var(--amarillo); }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }

    .form-group label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--gris);
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 11px 14px;
      color: #fff;
      font-family: 'Barlow', sans-serif;
      font-size: 14px;
      transition: border-color 0.2s;
      width: 100%;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus { outline: none; border-color: var(--amarillo); }

    .form-group textarea { resize: vertical; min-height: 80px; }

    .form-actions { margin-top: 24px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

    .btn-primary {
      background: var(--amarillo);
      color: #000;
      border: none;
      padding: 12px 28px;
      border-radius: var(--radius);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      display: flex; align-items: center; gap: 8px;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: var(--amarillo-dark); }

    .btn-secondary {
      background: transparent;
      color: var(--gris);
      border: 1px solid var(--border);
      padding: 12px 24px;
      border-radius: var(--radius);
      font-family: 'Barlow', sans-serif;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-secondary:hover { border-color: var(--gris); color: #fff; }

    .form-status { font-size: 13px; min-height: 20px; }
    .form-status.success { color: var(--verde); }
    .form-status.error { color: var(--rojo); }

    /* ── PROMOS LIST ── */
    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .list-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 24px;
      font-weight: 800;
      text-transform: uppercase;
      color: #fff;
    }

    .count-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--gris);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
    }

    .loading-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--gris);
    }

    .loading-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--amarillo);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--gris);
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }
    .empty-state i { font-size: 40px; color: var(--amarillo); margin-bottom: 12px; display: block; }

    .promo-list { display: flex; flex-direction: column; gap: 12px; }

    .promo-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 20px;
      align-items: center;
      transition: border-color 0.2s;
    }
    .promo-item:hover { border-color: rgba(245,166,35,0.3); }
    .promo-item.inactive { opacity: 0.5; }

    .promo-orden {
      width: 36px;
      height: 36px;
      background: var(--surface2);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 18px;
      color: var(--amarillo);
      flex-shrink: 0;
    }

    .promo-info h4 {
      font-weight: 600;
      font-size: 15px;
      color: #fff;
      margin-bottom: 4px;
    }

    .promo-info p {
      font-size: 13px;
      color: var(--gris);
      margin-bottom: 6px;
    }

    .promo-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

    .tag {
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .tag-active { background: rgba(39,174,96,0.15); color: var(--verde); border: 1px solid rgba(39,174,96,0.3); }
    .tag-inactive { background: rgba(255,255,255,0.05); color: var(--gris); border: 1px solid var(--border); }
    .tag-price { background: rgba(245,166,35,0.12); color: var(--amarillo); border: 1px solid rgba(245,166,35,0.25); }

    .promo-actions { display: flex; gap: 8px; flex-shrink: 0; }

    .btn-icon {
      width: 36px;
      height: 36px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      transition: all 0.2s;
      color: var(--gris);
    }
    .btn-icon:hover { border-color: rgba(245,166,35,0.5); color: var(--amarillo); background: rgba(245,166,35,0.08); }
    .btn-icon.danger:hover { border-color: rgba(192,57,43,0.5); color: var(--rojo); background: rgba(192,57,43,0.08); }

    /* ── MODAL CONFIRM ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(4px);
      display: none; align-items: center; justify-content: center;
      z-index: 1000;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 3px solid var(--rojo);
      border-radius: var(--radius);
      padding: 32px;
      max-width: 420px;
      width: 90%;
    }
    .modal h3 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px; font-weight: 800; text-transform: uppercase;
      color: #fff; margin-bottom: 12px;
    }
    .modal p { color: var(--gris); font-size: 14px; margin-bottom: 24px; }
    .modal-actions { display: flex; gap: 12px; justify-content: flex-end; }

    .btn-danger {
      background: var(--rojo);
      color: #fff;
      border: none;
      padding: 10px 24px;
      border-radius: var(--radius);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px; font-weight: 800; text-transform: uppercase;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-danger:hover { background: #962d22; }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--verde);
      padding: 14px 20px;
      border-radius: var(--radius);
      font-size: 14px;
      color: #fff;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 9999;
      display: flex; align-items: center; gap: 10px;
      max-width: 320px;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.error { border-left-color: var(--rojo); }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      .main-content { padding: 24px 16px; }
      .topbar { padding: 14px 16px; }
      .form-grid { grid-template-columns: 1fr; }
      .promo-item { grid-template-columns: 1fr auto; }
      .promo-orden { display: none; }
    }
  </style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">Brevi <span>Neumáticos</span></div>
    <div class="login-subtitle">Panel de administración</div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="passwordInput" placeholder="Ingresá tu contraseña" autocomplete="current-password">
    </div>
    <button class="btn-login" onclick="login()">
      <i class="fas fa-lock" style="margin-right:8px;"></i> Ingresar
    </button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ═══ PANEL ═══ -->
<div id="adminPanel">

  <div class="topbar">
    <div class="topbar-brand">Brevi <span>Admin</span></div>
    <div class="topbar-right">
      <span class="badge-admin"><i class="fas fa-shield-alt" style="margin-right:5px;"></i>Admin</span>
      <button class="btn-logout" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i> Salir
      </button>
    </div>
  </div>

  <div class="main-content">

    <div class="page-header">
      <div class="page-title">Gestión de <span>Ofertas</span></div>
      <div class="page-subtitle">Agregá, editá o desactivá promociones semanales.</div>
    </div>

    <!-- FORMULARIO -->
    <div class="form-card">
      <div class="form-card-title">
        <i class="fas fa-plus-circle"></i>
        <span id="formTitle">Nueva Oferta</span>
      </div>

      <input type="hidden" id="editId">

      <div class="form-grid">
        <div class="form-group full">
          <label>Título de la oferta *</label>
          <input type="text" id="fTitulo" placeholder="Ej: 20% OFF en toda la línea">
        </div>
        <div class="form-group">
          <label>Texto destacado (grande en banner)</label>
          <input type="text" id="fDestacado" placeholder="Ej: Pirelli Agro">
        </div>
        <div class="form-group">
          <label>Tag / Etiqueta (ícono + texto)</label>
          <input type="text" id="fTag" placeholder="Ej: 🔥 Oferta del mes">
        </div>
        <div class="form-group full">
          <label>Descripción *</label>
          <textarea id="fDescripcion" placeholder="Descripción breve de la promoción..."></textarea>
        </div>
        <div class="form-group">
          <label>Precio actual *</label>
          <input type="text" id="fPrecio" placeholder="Ej: $180.000 o 'Consultar'">
        </div>
        <div class="form-group">
          <label>Precio anterior (tachado)</label>
          <input type="text" id="fPrecioAnterior" placeholder="Ej: $225.000 (opcional)">
        </div>
        <div class="form-group">
          <label>Badge de descuento</label>
          <input type="text" id="fDescuento" placeholder="Ej: 20% OFF o PACK">
        </div>
        <div class="form-group">
          <label>Texto de WhatsApp (consulta)</label>
          <input type="text" id="fWhatsappTexto" placeholder="Ej: Consulto por 20% OFF Pirelli">
        </div>
        <div class="form-group full">
          <label>URL de imagen (banner o card)</label>
          <input type="url" id="fImagen" placeholder="https://... (dejá vacío para banner generado automáticamente)">
        </div>
        <div class="form-group">
          <label>¿Mostrar como Banner principal?</label>
          <select id="fEsBanner">
            <option value="false">No (solo tarjeta)</option>
            <option value="true">✅ Sí (aparece en carrusel de banners)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Orden de aparición</label>
          <input type="number" id="fOrden" placeholder="1, 2, 3..." min="1" value="1">
        </div>
        <div class="form-group">
          <label>Estado</label>
          <select id="fActiva">
            <option value="true">✅ Activa (visible en el sitio)</option>
            <option value="false">⏸ Inactiva (oculta)</option>
          </select>
        </div>
      </div>

      <div class="form-actions">
        <button class="btn-primary" onclick="guardarPromo()">
          <i class="fas fa-save"></i> <span id="btnGuardarText">Guardar oferta</span>
        </button>
        <button class="btn-secondary" id="btnCancelar" onclick="cancelarEdicion()" style="display:none;">
          Cancelar edición
        </button>
        <span class="form-status" id="formStatus"></span>
      </div>
    </div>

    <!-- LISTA -->
    <div class="list-header">
      <div class="list-title">Ofertas guardadas</div>
      <span class="count-badge" id="countBadge">cargando...</span>
    </div>

    <div id="promosList">
      <div class="loading-state">
        <div class="loading-spinner"></div>
        <p>Cargando ofertas...</p>
      </div>
    </div>

  </div>
</div>

<!-- MODAL ELIMINAR -->
<div class="modal-overlay" id="modalEliminar">
  <div class="modal">
    <h3>Eliminar oferta</h3>
    <p>¿Estás seguro? Esta acción no se puede deshacer.</p>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-danger" onclick="confirmarEliminar()"><i class="fas fa-trash"></i> Eliminar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
  // ══════════════════════════════════════════
  // CONFIGURACIÓN — pegá acá tus credenciales
  // ══════════════════════════════════════════
  const firebaseConfig = {
    apiKey: "TU_API_KEY",
    authDomain: "TU_AUTH_DOMAIN",
    projectId: "TU_PROJECT_ID",
    storageBucket: "TU_STORAGE_BUCKET",
    messagingSenderId: "TU_MESSAGING_SENDER_ID",
    appId: "TU_APP_ID"
  };

  // Contraseña del panel (cambiala por una segura)
  const ADMIN_PASSWORD = "brevi2024";

  // ══════════════════════════════════════════

  let db;
  let deleteTargetId = null;

  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
  } catch(e) {
    console.error('Firebase error:', e);
  }

  // ── AUTH ──
  function login() {
    const val = document.getElementById('passwordInput').value;
    if (val === ADMIN_PASSWORD) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminPanel').style.display = 'block';
      document.getElementById('loginError').textContent = '';
      cargarOfertas();
    } else {
      document.getElementById('loginError').textContent = 'Contraseña incorrecta.';
    }
  }

  document.getElementById('passwordInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  function logout() {
    document.getElementById('adminPanel').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('passwordInput').value = '';
  }

  // ── TOAST ──
  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.innerHTML = `<i class="fas fa-${isError ? 'times-circle' : 'check-circle'}"></i> ${msg}`;
    t.className = `toast${isError ? ' error' : ''} show`;
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  // ── CARGAR ──
  async function cargarOfertas() {
    const listEl = document.getElementById('promosList');
    const countEl = document.getElementById('countBadge');

    if (!db) {
      listEl.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Firebase no configurado. Completá las credenciales en el código.</p></div>';
      return;
    }

    listEl.innerHTML = '<div class="loading-state"><div class="loading-spinner"></div><p>Cargando...</p></div>';

    try {
      const snap = await db.collection('promociones').orderBy('orden', 'asc').get();
      const promos = [];
      snap.forEach(doc => promos.push({ id: doc.id, ...doc.data() }));

      countEl.textContent = `${promos.length} oferta${promos.length !== 1 ? 's' : ''}`;

      if (promos.length === 0) {
        listEl.innerHTML = '<div class="empty-state"><i class="fas fa-tag"></i><p>No hay ofertas todavía. ¡Creá la primera!</p></div>';
        return;
      }

      listEl.innerHTML = `<div class="promo-list">${promos.map(renderPromoItem).join('')}</div>`;
    } catch (err) {
      console.error(err);
      listEl.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Error al cargar: ${err.message}</p></div>`;
    }
  }

  function renderPromoItem(p) {
    const activa = p.activa !== false;
    const esBanner = p.esBanner === true;
    return `
      <div class="promo-item ${activa ? '' : 'inactive'}" id="item-${p.id}">
        <div class="promo-orden">${p.orden || '—'}</div>
        <div class="promo-info">
          <h4>${p.titulo || 'Sin título'}${p.destacado ? ` <span style="color:var(--amarillo)">${p.destacado}</span>` : ''}</h4>
          <p>${p.descripcion || ''}</p>
          <div class="promo-meta">
            <span class="tag ${activa ? 'tag-active' : 'tag-inactive'}">${activa ? 'Activa' : 'Inactiva'}</span>
            ${esBanner ? `<span class="tag" style="background:rgba(245,166,35,0.15);color:var(--amarillo);border:1px solid rgba(245,166,35,0.3);">📢 Banner</span>` : ''}
            ${p.precio ? `<span class="tag tag-price">${p.precio}</span>` : ''}
            ${p.descuento ? `<span class="tag" style="background:rgba(192,57,43,0.15);color:#e74c3c;border:1px solid rgba(192,57,43,0.3);">${p.descuento}</span>` : ''}
            ${p.precioAnterior ? `<span style="font-size:12px;color:var(--gris);text-decoration:line-through;">${p.precioAnterior}</span>` : ''}
          </div>
        </div>
        <div class="promo-actions">
          <button class="btn-icon" title="Editar" onclick="editarPromo('${p.id}')">
            <i class="fas fa-pencil-alt"></i>
          </button>
          <button class="btn-icon" title="${activa ? 'Desactivar' : 'Activar'}" onclick="toggleActiva('${p.id}', ${activa})">
            <i class="fas fa-${activa ? 'eye-slash' : 'eye'}"></i>
          </button>
          <button class="btn-icon danger" title="Eliminar" onclick="pedirEliminar('${p.id}')">
            <i class="fas fa-trash"></i>
          </button>
        </div>
      </div>
    `;
  }

  // ── GUARDAR ──
  async function guardarPromo() {
    const titulo = document.getElementById('fTitulo').value.trim();
    const descripcion = document.getElementById('fDescripcion').value.trim();
    const precio = document.getElementById('fPrecio').value.trim();

    if (!titulo || !descripcion || !precio) {
      setStatus('Completá los campos obligatorios (*).', 'error');
      return;
    }

    if (!db) { setStatus('Firebase no configurado.', 'error'); return; }

    const datos = {
      titulo,
      destacado: document.getElementById('fDestacado').value.trim() || null,
      tag: document.getElementById('fTag').value.trim() || null,
      descripcion,
      precio,
      precioAnterior: document.getElementById('fPrecioAnterior').value.trim() || null,
      descuento: document.getElementById('fDescuento').value.trim() || null,
      whatsappTexto: document.getElementById('fWhatsappTexto').value.trim() || null,
      imagen: document.getElementById('fImagen').value.trim() || null,
      esBanner: document.getElementById('fEsBanner').value === 'true',
      orden: parseInt(document.getElementById('fOrden').value) || 1,
      activa: document.getElementById('fActiva').value === 'true',
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    };

    const editId = document.getElementById('editId').value;
    setStatus('Guardando...', '');

    try {
      if (editId) {
        await db.collection('promociones').doc(editId).update(datos);
        showToast('Oferta actualizada correctamente.');
      } else {
        datos.createdAt = firebase.firestore.FieldValue.serverTimestamp();
        await db.collection('promociones').add(datos);
        showToast('Oferta creada y visible en el sitio.');
      }
      limpiarFormulario();
      cargarOfertas();
    } catch (err) {
      setStatus('Error: ' + err.message, 'error');
    }
  }

  // ── EDITAR ──
  async function editarPromo(id) {
    if (!db) return;
    try {
      const doc = await db.collection('promociones').doc(id).get();
      const p = doc.data();
      document.getElementById('editId').value = id;
      document.getElementById('fTitulo').value = p.titulo || '';
      document.getElementById('fDestacado').value = p.destacado || '';
      document.getElementById('fTag').value = p.tag || '';
      document.getElementById('fDescripcion').value = p.descripcion || '';
      document.getElementById('fPrecio').value = p.precio || '';
      document.getElementById('fPrecioAnterior').value = p.precioAnterior || '';
      document.getElementById('fDescuento').value = p.descuento || '';
      document.getElementById('fWhatsappTexto').value = p.whatsappTexto || '';
      document.getElementById('fImagen').value = p.imagen || '';
      document.getElementById('fEsBanner').value = p.esBanner ? 'true' : 'false';
      document.getElementById('fOrden').value = p.orden || 1;
      document.getElementById('fActiva').value = p.activa !== false ? 'true' : 'false';
      document.getElementById('formTitle').textContent = 'Editando oferta';
      document.getElementById('btnGuardarText').textContent = 'Actualizar oferta';
      document.getElementById('btnCancelar').style.display = 'inline-flex';
      document.querySelector('.form-card').scrollIntoView({ behavior: 'smooth' });
    } catch(err) {
      showToast('Error al cargar la oferta.', true);
    }
  }

  // ── TOGGLE ACTIVA ──
  async function toggleActiva(id, estadoActual) {
    if (!db) return;
    try {
      await db.collection('promociones').doc(id).update({ activa: !estadoActual });
      showToast(!estadoActual ? 'Oferta activada.' : 'Oferta desactivada.');
      cargarOfertas();
    } catch(err) {
      showToast('Error al actualizar.', true);
    }
  }

  // ── ELIMINAR ──
  function pedirEliminar(id) {
    deleteTargetId = id;
    document.getElementById('modalEliminar').classList.add('open');
  }
  function cerrarModal() {
    deleteTargetId = null;
    document.getElementById('modalEliminar').classList.remove('open');
  }
  async function confirmarEliminar() {
    if (!deleteTargetId || !db) return;
    try {
      await db.collection('promociones').doc(deleteTargetId).delete();
      cerrarModal();
      showToast('Oferta eliminada.');
      cargarOfertas();
    } catch(err) {
      showToast('Error al eliminar.', true);
    }
  }

  // ── HELPERS ──
  function cancelarEdicion() { limpiarFormulario(); }

  function limpiarFormulario() {
    ['fTitulo','fDestacado','fTag','fDescripcion','fPrecio','fPrecioAnterior','fDescuento','fWhatsappTexto','fImagen','editId'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('fOrden').value = '1';
    document.getElementById('fActiva').value = 'true';
    document.getElementById('fEsBanner').value = 'false';
    document.getElementById('formTitle').textContent = 'Nueva Oferta';
    document.getElementById('btnGuardarText').textContent = 'Guardar oferta';
    document.getElementById('btnCancelar').style.display = 'none';
    setStatus('', '');
  }

  function setStatus(msg, type) {
    const el = document.getElementById('formStatus');
    el.textContent = msg;
    el.className = `form-status ${type}`;
  }
</script>
</body>
</html>
